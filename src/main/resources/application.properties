spring.application.name=api
# 1. Database Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 2. JPA & Hibernate Settings (Telling Hibernate to back off)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. SQL Script Initialization (Telling Spring to use your script)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# 4. Server Port
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET}
# Access Token: 15 Minutes (900000 milliseconds)
jwt.expiration=900000
# Refresh Token: 7 Days (604800000 milliseconds)
jwt.refreshExpiration=604800000

# Email SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true