spring.application.name=api
# 1. Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres${DB_URL}
spring.datasource.username=postgres${DB_USERNAME}
spring.datasource.password=Th@ndePapa69${DB_PASSWORD}

# 2. JPA & Hibernate Settings (Telling Hibernate to back off)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. SQL Script Initialization (Telling Spring to use your script)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# 4. Server Port
server.port=8080